# Example batch for `ag batch batch.example.yaml [--submit] [--watch]`.
# Expands to (models × revisions) suites: pi cells launch as HF Jobs, the
# `claude` cell runs locally. Dry-run by default; --submit to launch.

profile: transformers

# Only the three fastest tasks (small text/tokenizer models).
tasks: [classify-sentiment, extract-entities, tokenize-count]

# These three tiny models fit easily in 50 GB, so use the cheaper flavor.
flavor: t4-small

models:
  - Qwen/Qwen3.5-9B
  - MiniMaxAI/MiniMax-M2.7
  - zai-org/GLM-5.1

revisions:
  - v5.8.0
  - v5.9.0
  - v5.10.2
  - {ref: 4d15b215f3, name: "w/ CLI + Skill"}
