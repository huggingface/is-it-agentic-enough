# Tasks for the before/after agent comparison.
#
# Each task names a specific Hugging Face model so the agent has to actually
# load and run it — otherwise the model will just answer from world knowledge
# and the test measures nothing. The prompts are styled as a developer asking
# an agent to execute a concrete inference job with a named model.
#
# Categories:
#   atomic        — one CLI command in the "after" state covers this task.
#                   Expected flip: "before" writes a Python script; "after"
#                   reaches for the CLI.
#   compositional — no single command fits; the agent has to write Python.
#                   Expected on "after": the agent reads src/transformers/cli/
#                   agentic/*.py as exemplar code rather than cold-starting.
#
# Optional `runs:` per task overrides the CLI-provided default (3). Cheap
# tasks default to 5 for tighter medians; expensive tasks stick to 3.

tasks:
  - id: classify-sentiment
    category: atomic
    expected: positive
    runs: 5
    prompt: |
      Using the model distilbert/distilbert-base-uncased-finetuned-sst-2-english,
      classify the sentiment of this sentence and report the label and score:
      "I absolutely loved the movie, it was fantastic!"

  - id: extract-entities
    category: atomic
    expected: tim cook
    runs: 5
    prompt: |
      Using the model dslim/bert-base-NER, extract the named entities from
      this sentence and report them with their types:
      "Apple CEO Tim Cook visited Paris last week to meet President Macron."

  - id: transcribe-audio
    category: atomic
    prompt: |
      Using the model openai/whisper-tiny, transcribe the audio file at
      ./inputs/sample.wav and report the transcript.

  - id: caption-image
    category: atomic
    expected: cat
    prompt: |
      Using the model llava-hf/llava-interleave-qwen-0.5b-hf, caption the image at
      ./inputs/cat.jpg and report the caption.

  - id: tokenize-count
    category: atomic
    expected: "10"
    runs: 5
    prompt: |
      Using the tokenizer from HuggingFaceTB/SmolLM2-360M-Instruct, tokenize
      the sentence "The quick brown fox jumps over the lazy dog." and tell me
      how many tokens it is.

  - id: summarize-text
    category: atomic
    prompt: |
      Using the model facebook/bart-large-cnn, summarize this article in one
      or two sentences:

      The James Webb Space Telescope has captured unprecedented images of
      distant galaxies, revealing structures that formed less than a billion
      years after the Big Bang. Scientists say the observations, released
      today, challenge existing models of early galaxy formation and suggest
      that massive galaxies assembled far more quickly than previously
      thought. The data will be made publicly available next month.

  - id: compose-transcribe-sentiment
    category: compositional
    prompt: |
      Transcribe the audio file at ./inputs/sample.wav using openai/whisper-tiny,
      then classify the sentiment of the transcript using
      distilbert/distilbert-base-uncased-finetuned-sst-2-english.
      Report both the transcript and the sentiment.

  - id: compose-caption-translate
    category: compositional
    prompt: |
      Caption the image at ./inputs/cat.jpg using llava-hf/llava-interleave-qwen-0.5b-hf,
      then translate the caption to French using Helsinki-NLP/opus-mt-en-fr.
      Report both the English caption and the French translation.
